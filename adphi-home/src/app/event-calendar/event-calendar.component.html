<div class="max-w-6xl mx-auto px-4 py-16">

  <h2 class="text-3xl font-bold text-gray-800">
    Upcoming Events
  </h2>
  <div class="w-20 h-1 bg-green-600 mt-2 mb-10"></div>

  <div class="space-y-6">
    <app-event-card
      *ngFor="let event of visibleEvents"
      [id]="event.id"
      [title]="event.title"
      [date]="event.date"
      [location]="event.location"
      [description]="event.description"
    >
    </app-event-card>
  </div>
  <div class="text-center mt-10" *ngIf="hasMore">
    <button
      (click)="loadMore()"
      class="px-6 py-3 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 transition duration-300 shadow-md"
    >
      Load More Events
    </button>
  </div>
</div>
