<div class="bg-white rounded-xl shadow-md hover:shadow-xl transition duration-300 p-6 flex gap-6 items-start">

  <!-- Date Block -->
  <div class="flex flex-col items-center justify-center bg-green-600 text-white rounded-lg px-4 py-3 min-w-[80px]">
    <span class="text-sm uppercase font-semibold">
      {{ date | date:'MMM' }}
    </span>
    <span class="text-2xl font-bold">
      {{ date | date:'dd' }}
    </span>
  </div>

  <!-- Event Info -->
  <div class="flex-1">
    <h3 class="text-xl font-bold text-gray-800 mb-1">
      {{ title }}
    </h3>

    <p class="text-sm text-gray-500 mb-2">
      📍 {{ location }} • {{ date | date:'fullDate' }}
    </p>

    <p class="text-gray-600 mb-4">
      {{ description }}
    </p>

    <a
      [routerLink]="['/events', id]"
      class="text-green-600 font-semibold hover:underline cursor-pointer"
    >
      View Details →
    </a>
  </div>
</div>
