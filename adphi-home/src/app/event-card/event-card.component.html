<div
  class="relative rounded-xl p-6 flex gap-6 items-start transition duration-300 animate-fade-in"
  [ngClass]="{
    'bg-white shadow-md hover:shadow-xl': !isPast,
    'bg-gray-100 border border-gray-300': isPast
  }"
>

  <!-- Past Badge -->
  <div
    *ngIf="isPast"
    class="absolute top-4 right-4 text-xs bg-gray-400 text-white px-2 py-1 rounded"
  >
    Past Event
  </div>

  <!-- Date Block -->
  <div
    class="flex flex-col items-center justify-center rounded-lg px-4 py-3 min-w-[80px] text-white"
    [ngClass]="{
      'bg-green-600': !isPast,
      'bg-gray-400': isPast
    }"
  >
    <span class="text-sm uppercase font-semibold">
      {{ date | date:'MMM' }}
    </span>
    <span class="text-2xl font-bold">
      {{ date | date:'dd' }}
    </span>
  </div>

  <!-- Event Info -->
  <div class="flex-1">
    <h3
      class="text-xl font-bold mb-1"
      [ngClass]="{
        'text-gray-800': !isPast,
        'text-gray-500': isPast
      }"
    >
      {{ title }}
    </h3>

    <p class="text-sm mb-2"
       [ngClass]="{
         'text-gray-500': !isPast,
         'text-gray-400': isPast
       }">
      📍 {{ location }} • {{ date | date:'fullDate' }}
    </p>

    <p
      class="mb-4"
      [ngClass]="{
        'text-gray-600': !isPast,
        'text-gray-500': isPast
      }"
    >
      {{ description }}
    </p>

    <a
      [routerLink]="['/events', id]"
      class="text-green-600 font-semibold hover:underline cursor-pointer"
    >
      View Details →
    </a>

    <span
      *ngIf="isPast"
      class="text-gray-400 font-semibold text-sm"
    >
      Event Completed
    </span>

  </div>
</div>
