<div
  class="relative rounded-xl overflow-hidden transition duration-300"
  [ngClass]="{
    'bg-white shadow-md hover:shadow-xl': !isPast,
    'bg-gray-100 border border-gray-300': isPast
  }"
>

  <!-- Image (Optional) -->
  <div *ngIf="image" class="h-48 w-full overflow-hidden">
    <img
      [src]="image"
      alt="Event Image"
      class="w-full h-full object-cover transition duration-500 hover:scale-105"
    />
  </div>

  <div class="p-6 flex gap-6 items-start">

    <!-- Date Block -->
    <div
      class="flex flex-col items-center justify-center rounded-lg px-4 py-3 min-w-[80px] text-white"
      [ngClass]="{
        'bg-green-600': !isPast,
        'bg-gray-400': isPast
      }"
    >
      <span class="text-sm uppercase font-semibold">
        {{ date | date:'MMM' }}
      </span>
      <span class="text-2xl font-bold">
        {{ date | date:'dd' }}
      </span>
    </div>

    <!-- Event Info -->
    <div class="flex-1">

      <!-- Category Badge -->
      <span
        *ngIf="category"
        class="inline-block text-xs font-semibold px-3 py-1 rounded-full mb-2"
        [ngClass]="{
          'bg-green-100 text-green-700': category === 'Social',
          'bg-blue-100 text-blue-700': category === 'Philanthropy',
          'bg-purple-100 text-purple-700': category === 'Recruitment',
          'bg-yellow-100 text-yellow-700': category === 'Alumni'
        }"
      >
        {{ category }}
      </span>

      <h3 class="text-xl font-bold text-gray-800 mb-1">
        {{ title }}
      </h3>

      <p class="text-sm text-gray-500 mb-2">
        📍 {{ location }} • {{ date | date:'fullDate' }}
      </p>

      <p class="text-gray-600 mb-4">
        {{ description }}
      </p>

      <a
        *ngIf="showDetailsLink && !isPast"
        [routerLink]="['/events', id]"
        class="text-green-600 font-semibold hover:underline cursor-pointer"
      >
        View Details →
      </a>

    </div>
  </div>
</div>
