<div class="relative">
  <!-- Image -->
   <img
    [src]="currentImage"
    alt="Hero"
    class="w-full h-[32rem] object-cover shadow-lg transition-opacity duration-1000"
  />

  <!-- Dark overlay -->
  <div class="absolute inset-0 bg-black opacity-40"></div>

  <!-- Centered Text -->
   <div class="absolute inset-0 flex items-center justify-center">

    <h1 class="text-white text-4xl md:text-5xl font-bold text-center">
      {{ displayedText }}
      <span class="animate-pulse">|</span>
    </h1>
  </div>
</div>
<!-- Latest News Section -->
<div class="max-w-6xl mx-auto px-4 py-12">
  <div class="flex flex-col items-left">
     <h2 class="text-3xl font-bold text-gray-800">
      Latest News
     </h2>
    <div class="w-20 h-1 bg-green-600 mt-2 mb-6"></div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-fade-in">
    <div *ngFor="let item of newsItems" class="bg-white shadow-md rounded-lg overflow-hidden">
      
      <img
        [src]="item.image"
        alt="News Image"
        class="w-full h-48 object-cover"
      />

      <div class="p-4">
        <h3 class="text-xl font-semibold text-gray-800 mb-2">
          {{ item.title }}
        </h3>

         <p class="text-sm text-gray-500 mb-3">
            {{ item.date }}
        </p>

        <p class="text-gray-600 mb-4">
          {{ item.excerpt }}
        </p>

        <a
          [href]="item.link"
          class="inline-block text-green-600 font-semibold hover:underline"
        >
          Read More →
        </a>
      </div>
    </div>
  </div>
</div>
